<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Executive protection and travel security for high-profile individuals, corporate leaders, and families. Discreet, intelligence-driven protection services locally, nationally, and internationally.">
    <title>VIPS Personal Protection LLC | Executive Protection & Travel Security</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-dark: #0a0e27;
            --secondary-dark: #151829;
            --accent-gold: #d4a574;
            --accent-gold-light: #e8c89c;
            --accent-red: #c41e3a;
            --text-light: #e8e8e8;
            --text-muted: #b0b0b0;
            --border-subtle: #2a2e4a;
        }

        /* Gold gradient shine effect */
        @keyframes shimmer {
            0% { background-position: -1000px 0; }
            100% { background-position: 1000px 0; }
        }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--primary-dark) 0%, var(--secondary-dark) 100%);
            color: var(--text-light);
            line-height: 1.6;
            position: relative;
            overflow-x: hidden;
        }

        /* ===== HEADER / NAVIGATION ===== */
        header {
            background: rgba(10, 14, 39, 0.98);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border-subtle);
            position: sticky;
            top: 0;
            z-index: 1000;
            padding: 1rem 0;
            box-shadow: 0 0 30px rgba(212, 165, 116, 0.1);
        }

        header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent-gold), var(--accent-gold-light), var(--accent-gold), transparent);
            box-shadow: 0 0 20px rgba(212, 165, 116, 0.8);
        }

        header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent-gold), var(--accent-gold-light), var(--accent-gold), transparent);
            box-shadow: 0 0 10px rgba(212, 165, 116, 0.5);
        }

        .header-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 2rem;
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 1rem;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .logo-section:hover {
            transform: translateY(-2px);
        }

        .logo-img {
            height: 60px;
            width: auto;
            filter: drop-shadow(0 0 10px rgba(212, 165, 116, 0.4));
            transition: all 0.3s ease;
        }

        .logo-section:hover .logo-img {
            filter: drop-shadow(0 0 15px rgba(212, 165, 116, 0.6));
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 0.15em;
            background: linear-gradient(135deg, var(--accent-gold), var(--accent-gold-light), var(--accent-gold));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 8px rgba(212, 165, 116, 0.6));
            text-decoration: none;
            cursor: pointer;
        }

        .logo span {
            color: var(--accent-red);
            filter: drop-shadow(0 0 5px rgba(196, 30, 58, 0.4));
        }

        nav {
            display: flex;
            gap: 2.5rem;
            align-items: center;
            flex-wrap: wrap;
        }

        nav > a {
            color: var(--text-light);
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 500;
            transition: all 0.3s ease;
            position: relative;
        }

        nav > a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--accent-gold), var(--accent-gold-light));
            transition: width 0.3s ease;
            box-shadow: 0 0 10px rgba(212, 165, 116, 0.5);
        }

        nav > a:hover::after {
            width: 100%;
        }

        nav > a:hover {
            color: var(--accent-gold);
        }

        /* Submenu styling */
        .nav-item {
            position: relative;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .nav-item > a {
            color: var(--text-light);
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .nav-item > a:hover {
            color: var(--accent-gold);
        }

        .submenu-toggle {
            color: var(--accent-gold);
            cursor: pointer;
            font-size: 0.8rem;
            transition: transform 0.3s ease;
        }

        .nav-item:hover .submenu-toggle {
            transform: rotate(180deg);
        }

        .submenu {
            position: absolute;
            top: 100%;
            left: 0;
            background: rgba(10, 14, 39, 0.98);
            border: 1px solid var(--border-subtle);
            border-top: 2px solid var(--accent-gold);
            border-radius: 2px;
            min-width: 200px;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-10px);
            transition: all 0.3s ease;
            z-index: 1001;
            margin-top: 1rem;
        }

        .nav-item:hover .submenu {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .submenu a {
            display: block;
            padding: 0.8rem 1.5rem;
            color: var(--text-light);
            text-decoration: none;
            transition: all 0.3s ease;
            border-left: 3px solid transparent;
        }

        .submenu a:hover {
            background: rgba(212, 165, 116, 0.1);
            color: var(--accent-gold);
            border-left-color: var(--accent-gold);
            padding-left: 1.8rem;
        }

        .submenu a:first-child {
            border-radius: 2px 2px 0 0;
        }

        .submenu a:last-child {
            border-radius: 0 0 2px 2px;
        }

        .cta-button {
            background: linear-gradient(135deg, var(--accent-red), #e53d4f);
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 2px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(196, 30, 58, 0.3);
            white-space: nowrap;
        }

        .cta-button:hover {
            background: linear-gradient(135deg, var(--accent-gold), var(--accent-gold-light));
            color: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(212, 165, 116, 0.4);
        }

        /* ===== HERO SECTION ===== */
        .hero {
            min-height: 90vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            padding: 2rem;
            border-bottom: 2px solid;
            border-image: linear-gradient(90deg, transparent, var(--accent-gold), var(--accent-gold-light), var(--accent-gold), transparent) 1;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 30% 50%, rgba(196, 30, 58, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 70% 50%, rgba(212, 165, 116, 0.1) 0%, transparent 50%);
            pointer-events: none;
        }

        .hero-content {
            position: relative;
            z-index: 10;
            text-align: center;
            max-width: 900px;
            animation: fadeInUp 1s ease-out;
        }

        .hero h1 {
            font-size: clamp(2.5rem, 8vw, 4.5rem);
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: 1.5rem;
            letter-spacing: -0.02em;
        }

        .hero h1 .highlight {
            color: var(--accent-gold);
            position: relative;
            display: inline-block;
        }

        .hero .subtitle {
            font-size: 1.25rem;
            color: var(--text-muted);
            margin-bottom: 2.5rem;
            font-weight: 300;
            line-height: 1.8;
        }

        .hero-cta {
            display: flex;
            gap: 1.5rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn-primary, .btn-secondary {
            padding: 1rem 2.5rem;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            cursor: pointer;
            border-radius: 2px;
            transition: all 0.3s ease;
            letter-spacing: 0.05em;
            position: relative;
            overflow: hidden;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent-red), #e53d4f);
            color: white;
            box-shadow: 0 0 20px rgba(196, 30, 58, 0.3);
        }

        .btn-primary::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s ease;
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, var(--accent-gold), var(--accent-gold-light));
            color: var(--primary-dark);
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(212, 165, 116, 0.4);
        }

        .btn-primary:hover::before {
            left: 100%;
        }

        .btn-secondary {
            background: transparent;
            color: var(--accent-gold);
            border: 2px solid var(--accent-gold);
            box-shadow: inset 0 0 20px rgba(212, 165, 116, 0.05);
        }

        .btn-secondary:hover {
            background: var(--accent-gold);
            color: var(--primary-dark);
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(212, 165, 116, 0.4);
        }

        /* ===== CREDENTIALS BADGE ===== */
        .credentials {
            margin-top: 4rem;
            padding-top: 2rem;
            border-top: 1px solid var(--border-subtle);
            display: flex;
            justify-content: center;
            gap: 3rem;
            flex-wrap: wrap;
            font-size: 0.9rem;
        }

        .credential-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            background: rgba(212, 165, 116, 0.05);
            border: 1px solid rgba(212, 165, 116, 0.2);
            border-radius: 20px;
            transition: all 0.3s ease;
        }

        .credential-item:hover {
            background: rgba(212, 165, 116, 0.1);
            border-color: var(--accent-gold);
            box-shadow: 0 0 15px rgba(212, 165, 116, 0.3);
        }

        .credential-icon {
            width: 24px;
            height: 24px;
            background: linear-gradient(135deg, var(--accent-gold), var(--accent-gold-light));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            color: var(--primary-dark);
            font-weight: 700;
            box-shadow: 0 0 15px rgba(212, 165, 116, 0.6);
        }

        /* ===== POSITIONING STATEMENT ===== */
        .positioning {
            background: rgba(20, 24, 41, 0.8);
            border-top: 1px solid var(--border-subtle);
            border-bottom: 1px solid var(--border-subtle);
            padding: 4rem 2rem;
            position: relative;
        }

        .positioning::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent-gold), var(--accent-gold-light), var(--accent-gold), transparent);
            box-shadow: 0 0 15px rgba(212, 165, 116, 0.7);
        }

        .positioning::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent-gold), var(--accent-gold-light), var(--accent-gold), transparent);
            box-shadow: 0 0 10px rgba(212, 165, 116, 0.4);
        }

        .positioning-content {
            max-width: 900px;
            margin: 0 auto;
            text-align: center;
        }

        .positioning h2 {
            font-size: 2.2rem;
            margin-bottom: 1.5rem;
            font-weight: 700;
        }

        .positioning p {
            font-size: 1.1rem;
            color: var(--text-muted);
            line-height: 1.8;
            max-width: 800px;
            margin: 0 auto;
        }

        /* ===== SERVICES SECTION ===== */
        .services {
            padding: 5rem 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .section-title {
            text-align: center;
            margin-bottom: 3rem;
            position: relative;
        }

        .section-title::before {
            content: '';
            display: block;
            width: 60px;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent-gold), transparent);
            margin: 0 auto 1.5rem;
            box-shadow: 0 0 10px rgba(212, 165, 116, 0.6);
        }

        .section-title h2 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent-gold), var(--text-light));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .section-title p {
            font-size: 1.1rem;
            color: var(--text-muted);
            max-width: 600px;
            margin: 0 auto;
        }

        .section-title::after {
            content: '';
            display: block;
            width: 60px;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent-gold), transparent);
            margin: 1.5rem auto 0;
            box-shadow: 0 0 10px rgba(212, 165, 116, 0.6);
        }

        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 2rem;
        }

        .service-card {
            background: rgba(21, 24, 41, 0.6);
            border: 1px solid var(--border-subtle);
            padding: 2.5rem;
            border-radius: 2px;
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
        }

        .service-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(212, 165, 116, 0.1), transparent);
            transition: left 0.5s ease;
        }

        .service-card:hover {
            border-color: var(--accent-gold);
            transform: translateY(-8px);
            background: rgba(21, 24, 41, 0.9);
            box-shadow: 0 0 30px rgba(212, 165, 116, 0.3), inset 0 0 20px rgba(212, 165, 116, 0.05);
        }

        .service-card:hover::before {
            left: 100%;
        }

        .service-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, var(--accent-red), #e53d4f);
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            border-radius: 2px;
            box-shadow: 0 0 20px rgba(196, 30, 58, 0.4);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .service-icon::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            animation: shine 3s infinite;
        }

        @keyframes shine {
            0% { transform: translateX(-100%) translateY(-100%); }
            100% { transform: translateX(100%) translateY(100%); }
        }

        .service-card:hover .service-icon {
            background: linear-gradient(135deg, var(--accent-gold), var(--accent-gold-light));
            box-shadow: 0 0 30px rgba(212, 165, 116, 0.6);
            transform: scale(1.1) rotateZ(5deg);
        }

        .service-card h3 {
            font-size: 1.4rem;
            margin-bottom: 1rem;
            font-weight: 700;
        }

        .service-card p {
            color: var(--text-muted);
            font-size: 0.95rem;
            line-height: 1.7;
            margin-bottom: 1.5rem;
        }

        .service-card a {
            color: var(--accent-gold);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .service-card a:hover {
            gap: 1rem;
            color: var(--accent-red);
        }

        /* ===== CAPABILITIES SECTION ===== */
        .capabilities {
            background: rgba(20, 24, 41, 0.6);
            padding: 5rem 2rem;
            border-top: 1px solid var(--border-subtle);
            border-bottom: 1px solid var(--border-subtle);
            position: relative;
        }

        .capabilities::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent-gold), var(--accent-gold-light), var(--accent-gold), transparent);
            box-shadow: 0 0 15px rgba(212, 165, 116, 0.7);
        }

        .capabilities::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent-gold), var(--accent-gold-light), var(--accent-gold), transparent);
            box-shadow: 0 0 10px rgba(212, 165, 116, 0.4);
        }

        .capabilities-content {
            max-width: 1200px;
            margin: 0 auto;
        }

        .capabilities h2 {
            font-size: 2.2rem;
            margin-bottom: 3rem;
            text-align: center;
            font-weight: 700;
        }

        .capabilities-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 2rem;
        }

        .capability-item {
            background: rgba(10, 14, 39, 0.5);
            padding: 2rem;
            border-left: 3px solid var(--accent-gold);
            border-radius: 2px;
            transition: all 0.3s ease;
        }

        .capability-item:hover {
            background: rgba(10, 14, 39, 0.8);
            border-left-color: var(--accent-red);
            transform: translateX(5px);
            box-shadow: 0 0 20px rgba(212, 165, 116, 0.2), inset 0 0 15px rgba(212, 165, 116, 0.05);
        }

        .capability-item h4 {
            font-size: 1.2rem;
            margin-bottom: 0.8rem;
            font-weight: 700;
        }

        .capability-item p {
            color: var(--text-muted);
            font-size: 0.95rem;
            line-height: 1.6;
        }

        /* ===== WHY VIPS SECTION ===== */
        .why-vips {
            padding: 5rem 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .why-vips h2 {
            font-size: 2.2rem;
            margin-bottom: 3rem;
            text-align: center;
            font-weight: 700;
        }

        .why-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2.5rem;
        }

        .why-item {
            position: relative;
            padding: 2rem;
            text-align: center;
            background: rgba(21, 24, 41, 0.4);
            border: 1px solid rgba(212, 165, 116, 0.1);
            border-radius: 2px;
            transition: all 0.3s ease;
        }

        .why-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent-gold), transparent);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .why-item:hover {
            background: rgba(21, 24, 41, 0.7);
            border-color: var(--accent-gold);
            box-shadow: 0 0 30px rgba(212, 165, 116, 0.2), inset 0 0 20px rgba(212, 165, 116, 0.05);
        }

        .why-item:hover::before {
            opacity: 1;
        }

        .why-number {
            font-size: 3.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent-gold), var(--accent-gold-light));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem;
        }

        .why-item h4 {
            font-size: 1.3rem;
            margin-bottom: 1rem;
            font-weight: 700;
        }

        .why-item p {
            color: var(--text-muted);
            line-height: 1.7;
            font-size: 0.95rem;
        }

        /* ===== PROCESS SECTION ===== */
        .process {
            background: rgba(20, 24, 41, 0.6);
            padding: 5rem 2rem;
            border-top: 1px solid var(--border-subtle);
            border-bottom: 1px solid var(--border-subtle);
            position: relative;
        }

        .process::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent-gold), var(--accent-gold-light), var(--accent-gold), transparent);
            box-shadow: 0 0 15px rgba(212, 165, 116, 0.7);
        }

        .process::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent-gold), var(--accent-gold-light), var(--accent-gold), transparent);
            box-shadow: 0 0 10px rgba(212, 165, 116, 0.4);
        }

        .process-content {
            max-width: 1000px;
            margin: 0 auto;
        }

        .process h2 {
            font-size: 2.2rem;
            margin-bottom: 3rem;
            text-align: center;
            font-weight: 700;
        }

        .process-steps {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 2rem;
            position: relative;
        }

        .process-step {
            background: rgba(10, 14, 39, 0.5);
            padding: 2rem;
            border-radius: 2px;
            text-align: center;
            position: relative;
            z-index: 2;
            border: 1px solid var(--border-subtle);
            transition: all 0.3s ease;
        }

        .process-step:hover {
            background: rgba(10, 14, 39, 0.8);
            border-color: var(--accent-gold);
            box-shadow: 0 0 25px rgba(212, 165, 116, 0.3), inset 0 0 15px rgba(212, 165, 116, 0.05);
            transform: translateY(-5px);
        }

        .step-number {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, var(--accent-red), #e53d4f);
            color: white;
            font-weight: 700;
            font-size: 1.5rem;
            margin-bottom: 1rem;
            border-radius: 50%;
            box-shadow: 0 0 25px rgba(196, 30, 58, 0.4);
            position: relative;
        }

        .process-step:hover .step-number {
            background: linear-gradient(135deg, var(--accent-gold), var(--accent-gold-light));
            box-shadow: 0 0 30px rgba(212, 165, 116, 0.6);
            transform: scale(1.15);
        }

        .process-step h4 {
            font-size: 1.2rem;
            margin-bottom: 0.8rem;
            font-weight: 700;
        }

        .process-step p {
            color: var(--text-muted);
            font-size: 0.9rem;
            line-height: 1.6;
        }

        /* ===== CTA SECTION ===== */
        .cta-section {
            padding: 4rem 2rem;
            text-align: center;
            border-top: 2px solid;
            border-image: linear-gradient(90deg, transparent, var(--accent-gold), var(--accent-gold-light), var(--accent-gold), transparent) 1;
            position: relative;
        }

        .cta-section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent-gold), var(--accent-gold-light), var(--accent-gold), transparent);
            box-shadow: 0 0 20px rgba(212, 165, 116, 0.8);
        }

        .cta-section h2 {
            font-size: 2.2rem;
            margin-bottom: 1.5rem;
            font-weight: 700;
        }

        .cta-section p {
            font-size: 1.1rem;
            color: var(--text-muted);
            margin-bottom: 2.5rem;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        /* ===== FOOTER ===== */
        footer {
            background: rgba(10, 14, 39, 0.95);
            border-top: 1px solid var(--border-subtle);
            padding: 4rem 2rem 2rem;
            margin-top: 3rem;
            position: relative;
        }

        footer::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent-gold), var(--accent-gold-light), var(--accent-gold), transparent);
            box-shadow: 0 0 20px rgba(212, 165, 116, 0.8);
        }

        .footer-content {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 2.5rem;
            margin-bottom: 3rem;
        }

        .footer-section h4 {
            font-size: 1.1rem;
            margin-bottom: 1.5rem;
            font-weight: 700;
            color: var(--accent-gold);
        }

        .footer-section a, .footer-section p {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            margin-bottom: 0.8rem;
            transition: color 0.3s ease;
        }

        .footer-section a:hover {
            color: var(--accent-gold);
        }

        .footer-bottom {
            border-top: 1px solid var(--border-subtle);
            padding-top: 2rem;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        /* ===== ANIMATIONS ===== */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .fade-in {
            animation: fadeInUp 0.8s ease-out forwards;
        }

        /* ===== RESPONSIVE ===== */
        .hamburger {
            display: none;
            flex-direction: column;
            gap: 6px;
            background: transparent;
            border: 2px solid var(--accent-gold);
            border-radius: 4px;
            cursor: pointer;
            padding: 0.6rem 0.8rem;
            width: 45px;
            height: 45px;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            z-index: 1001;
        }
        .hamburger:hover {
            background: rgba(212, 165, 116, 0.1);
            box-shadow: 0 0 10px rgba(212, 165, 116, 0.5);
        }
        .hamburger span {
            width: 22px;
            height: 2.5px;
            background: var(--accent-gold);
            border-radius: 2px;
            transition: all 0.3s ease;
            display: block;
        }
        .hamburger.active span:nth-child(1) {
            transform: rotate(45deg) translate(8px, 8px);
            background: var(--accent-red);
        }
        .hamburger.active span:nth-child(2) {
            opacity: 0;
        }
        .hamburger.active span:nth-child(3) {
            transform: rotate(-45deg) translate(7px, -7px);
            background: var(--accent-red);
        }
            transform: rotate(-45deg) translate(7px, -7px);
        }
        .mobile-menu {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: rgba(10, 14, 39, 0.98);
            border-bottom: 1px solid var(--border-subtle);
            padding: 1rem;
            z-index: 999;
            max-height: 80vh;
            overflow-y: auto;
        }
        .mobile-menu.active {
            display: block;
        }
        .mobile-menu a, .mobile-menu-section > span {
            display: block;
            padding: 1rem;
            color: var(--text-light);
            text-decoration: none;
            border-bottom: 1px solid var(--border-subtle);
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .mobile-menu a:hover {
            background: rgba(212, 165, 116, 0.1);
            color: var(--accent-gold);
            padding-left: 1.5rem;
        }
        .mobile-menu-section {
            border-bottom: 2px solid var(--border-subtle);
        }
        .mobile-menu-section > span {
            color: var(--accent-gold);
            font-weight: 600;
            cursor: pointer;
        }
        .mobile-submenu {
            display: none;
            background: rgba(21, 24, 41, 0.8);
        }
        .mobile-submenu.active {
            display: block;
        }
        .mobile-submenu a {
            padding: 0.8rem 1.5rem;
            border-bottom: 1px solid var(--border-subtle);
        }
        .mobile-cta {
            padding: 1rem;
            margin: 1rem;
            background: linear-gradient(135deg, var(--accent-red), #e53d4f);
            color: white;
            text-align: center;
            border-radius: 2px;
            font-weight: 600;
            cursor: pointer;
            border: none;
        }
        .mobile-cta:hover {
            background: linear-gradient(135deg, var(--accent-gold), var(--accent-gold-light));
            color: var(--primary-dark);
        }

        @media (max-width: 768px) {
            .header-container { 
                flex-direction: row;
                gap: 1rem;
                justify-content: space-between;
            }
            .logo-section {

                width: auto;
                flex: 1;
            }
            .logo-img {
                height: 50px;
            }
            .logo {
                font-size: 1.1rem;
                letter-spacing: 0.1em;
            }
            nav { 
                display: none;
            }
